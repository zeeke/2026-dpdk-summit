apiVersion: v1
kind: Pod
metadata:
  name: grout
  namespace: grout
  annotations:
    k8s.v1.cni.cncf.io/networks: |-
      [
        {"name": "net-a-cnfdr26", "namespace": "grout"},
        {"name": "net-b-cnfdr26", "namespace": "grout"}
      ]
    cpu-load-balancing.crio.io: "disable"
    cpu-quota.crio.io: "disable"
    irq-load-balancing.crio.io: "disable"
spec:
  nodeSelector:
    kubernetes.io/hostname: cnfdr26.telco5g.eng.rdu2.redhat.com
  runtimeClassName: performance-grout-performance
  containers:
    - name: grout
      image: quay.io/grout/grout:0.15
      command: ["bash", "-c"]
      args:
        - |
          VF0=$(echo "$PCIDEVICE_OPENSHIFT_IO_ENS7F0VFS" | cut -d, -f1)
          VF1=$(echo "$PCIDEVICE_OPENSHIFT_IO_ENS7F0VFS" | cut -d, -f2)
          sed "s/__VF0__/$VF0/g; s/__VF1__/$VF1/g" /etc/grout/grout.init > /tmp/grout.init
          /usr/bin/grout -v &
          GROUT_PID=$!
          until [ -S /run/grout.sock ]; do sleep 0.1; done
          grep -v '^\s*#' /tmp/grout.init | grep -v '^\s*$' | while read -r line; do
            grcli $line
          done
          wait $GROUT_PID
      securityContext:
        privileged: true
        runAsUser: 0
        capabilities:
          add:
            - IPC_LOCK
            - SYS_RAWIO
            - NET_ADMIN
            - NET_RAW
      resources:
        requests:
          cpu: "4"
          memory: 2Gi
          hugepages-1Gi: 2Gi
          openshift.io/ens7f0vfs: "2"
        limits:
          cpu: "4"
          memory: 2Gi
          hugepages-1Gi: 2Gi
          openshift.io/ens7f0vfs: "2"
      volumeMounts:
        - name: hugepages
          mountPath: /dev/hugepages
        - name: grout-config
          mountPath: /etc/grout
  volumes:
    - name: hugepages
      emptyDir:
        medium: HugePages
    - name: grout-config
      configMap:
        name: grout-config
        defaultMode: 0755
  terminationGracePeriodSeconds: 5
