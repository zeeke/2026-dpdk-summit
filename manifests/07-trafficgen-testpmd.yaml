apiVersion: v1
kind: Pod
metadata:
  name: testpmd
  namespace: grout
  annotations:
    k8s.v1.cni.cncf.io/networks: |-
      [
        {"name": "net-a-cnfdr27", "namespace": "grout"},
        {"name": "net-b-cnfdr27", "namespace": "grout"}
      ]
    cpu-load-balancing.crio.io: "disable"
    cpu-quota.crio.io: "disable"
    irq-load-balancing.crio.io: "disable"
spec:
  nodeSelector:
    kubernetes.io/hostname: cnfdr27.telco5g.eng.rdu2.redhat.com
  runtimeClassName: performance-grout-performance
  containers:
    - name: testpmd
      image: registry.redhat.io/openshift4/dpdk-base-rhel9:v4.18
      command: ["sleep", "infinity"]
      # After pod is running, exec in and run testpmd:
      #
      # Discover VF PCI addresses:
      #   env | grep PCIDEVICE
      #   (PCIDEVICE_OPENSHIFT_IO_ENS6F0VFS = comma-separated PCI addrs)
      #
      # macswap mode (bidirectional forwarding between the two VFs):
      #   testpmd -l 0-3 -n 4 --socket-mem 1024 \
      #     -a <VF0_PCI> -a <VF1_PCI> \
      #     -- --forward-mode=macswap --stats-period=5
      #
      # txonly mode (generate traffic on port A toward grout):
      #   testpmd -l 0-3 -n 4 --socket-mem 1024 \
      #     -a <VF0_PCI> \
      #     -- --forward-mode=txonly --txpkts=64 --stats-period=5 --eth-peer=0,GROUT_P0_MAC
      securityContext:
        privileged: true
        runAsUser: 0
        capabilities:
          add:
            - IPC_LOCK
            - SYS_RAWIO
            - NET_ADMIN
            - NET_RAW
      resources:
        requests:
          cpu: "4"
          memory: 2Gi
          hugepages-1Gi: 2Gi
          openshift.io/ens6f0vfs: "2"
        limits:
          cpu: "4"
          memory: 2Gi
          hugepages-1Gi: 2Gi
          openshift.io/ens6f0vfs: "2"
      volumeMounts:
        - name: hugepages
          mountPath: /dev/hugepages
  volumes:
    - name: hugepages
      emptyDir:
        medium: HugePages
  terminationGracePeriodSeconds: 5
