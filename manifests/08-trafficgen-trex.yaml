apiVersion: v1
kind: ConfigMap
metadata:
  name: trex-config
  namespace: grout
data:
  trex_cfg.yaml: |
    # TRex configuration
    # PCI addresses must be updated with actual VF PCI addresses
    # Discover them: env | grep PCIDEVICE
    # (PCIDEVICE_OPENSHIFT_IO_ENS6F0VFS = comma-separated PCI addrs)
    - port_limit: 2
      version: 2
      interfaces:
        - "REPLACE_WITH_VF0_PCI"
        - "REPLACE_WITH_VF1_PCI"
      port_info:
        - ip: 192.168.1.20
          default_gw: 192.168.1.10
        - ip: 192.168.2.20
          default_gw: 192.168.2.10
  simple_l3.py: |
    from trex_stl_lib.api import *

    class STLS1(object):
        def create_stream(self, direction=0):
            if direction == 0:
                src_ip = "192.168.1.20"
                dst_ip = "192.168.2.20"
            else:
                src_ip = "192.168.2.20"
                dst_ip = "192.168.1.20"

            pkt = Ether() / IP(src=src_ip, dst=dst_ip) / UDP(dport=12, sport=1025) / ('x' * 18)
            return STLStream(packet=STLPktBuilder(pkt=pkt), mode=STLTXCont(pps=1000000))

        def get_streams(self, direction=0, **kwargs):
            return [self.create_stream(direction)]

    def register():
        return STLS1()
---
apiVersion: v1
kind: Pod
metadata:
  name: trex
  namespace: grout
  annotations:
    k8s.v1.cni.cncf.io/networks: |-
      [
        {"name": "grout-net-a-cnfdr27", "namespace": "grout"},
        {"name": "grout-net-b-cnfdr27", "namespace": "grout"}
      ]
    cpu-load-balancing.crio.io: "disable"
    cpu-quota.crio.io: "disable"
    irq-load-balancing.crio.io: "disable"
spec:
  nodeSelector:
    kubernetes.io/hostname: cnfdr27.telco5g.eng.rdu2.redhat.com
  runtimeClassName: performance-grout-performance
  containers:
    - name: trex
      image: quay.io/wizhao/trex:latest
      command: ["sleep", "infinity"]
      # After pod is running:
      #
      # 1. Update /etc/trex_cfg.yaml with actual VF PCI addresses:
      #      env | grep PCIDEVICE
      #      cp /etc/trex/trex_cfg.yaml /etc/trex_cfg.yaml
      #      # edit PCI addresses
      #
      # 2. Start TRex server:
      #      cd /opt/trex && ./t-rex-64 -i --no-scapy-server
      #
      # 3. Run traffic:
      #      cd /opt/trex && ./trex-console
      #      trex> start -f /etc/trex/simple_l3.py -m 100% --port 0 1 -d 60
      #      trex> stats
      securityContext:
        privileged: true
        runAsUser: 0
        capabilities:
          add:
            - IPC_LOCK
            - SYS_RAWIO
            - NET_ADMIN
            - NET_RAW
      resources:
        requests:
          cpu: "4"
          memory: 2Gi
          hugepages-1Gi: 2Gi
          openshift.io/ens6f0vfs: "2"
        limits:
          cpu: "4"
          memory: 2Gi
          hugepages-1Gi: 2Gi
          openshift.io/ens6f0vfs: "2"
      volumeMounts:
        - name: hugepages
          mountPath: /dev/hugepages
        - name: trex-config
          mountPath: /etc/trex
  volumes:
    - name: hugepages
      emptyDir:
        medium: HugePages
    - name: trex-config
      configMap:
        name: trex-config
  terminationGracePeriodSeconds: 5
